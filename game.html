<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>消灭星星 - 手机版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: manipulation;
        }

        body {
            background: #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            transform: translateZ(0);
            will-change: transform;
            position: relative;
        }

        .fireworks {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .firework {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: firework 3s ease-out forwards;
        }

        @keyframes firework {
            0% {
                transform: scale(0);
                opacity: 1;
            }
            50% {
                transform: scale(1);
                opacity: 0.8;
            }
            100% {
                transform: scale(2);
                opacity: 0;
            }
        }

        .spark {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #fff;
            border-radius: 50%;
            animation: spark 1s ease-out forwards;
        }

        @keyframes spark {
            0% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) scale(0);
                opacity: 0;
            }
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #fff;
            border-radius: 50%;
            animation: twinkle 3s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% {
                opacity: 0.3;
                transform: scale(1);
            }
            50% {
                opacity: 1;
                transform: scale(1.2);
            }
        }

        .game-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            background: transparent;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: rgba(255, 107, 107, 0.8);
            color: white;
            flex-shrink: 0;
            backdrop-filter: blur(10px);
        }

        .bomb-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .bomb-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            font-weight: bold;
            color: white;
            transition: all 0.2s ease;
        }

        .bomb-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        .bomb-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .top-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 5px;
        }

        .pause-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            color: white;
            transition: all 0.2s ease;
        }

        .pause-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        .bomb-count {
            font-size: 18px;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.3);
            padding: 4px 10px;
            border-radius: 15px;
        }

        .level-info {
            font-size: 16px;
            font-weight: bold;
        }

        .score-info {
            font-size: 20px;
            font-weight: bold;
        }

        .target-info {
            font-size: 14px;
            font-weight: normal;
            margin-top: 4px;
            color: rgba(255,255,255,0.9);
        }

        #gameCanvas {
            width: 100%;
            aspect-ratio: 1/1;
            display: block;
            background: transparent;
            image-rendering: optimizeSpeed;
            image-rendering: -webkit-optimize-contrast;
        }

        .canvas-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        .game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            transform: translateZ(0);
            z-index: 100;
        }

        .game-over h2 {
            font-size: 40px;
            margin-bottom: 20px;
            text-shadow: 0 0 15px rgba(255,255,255,0.5);
        }

        .start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 200;
            backdrop-filter: blur(5px);
        }

        .start-screen h1 {
            font-size: 56px;
            margin-bottom: 16px;
            text-shadow: 0 0 25px rgba(255, 107, 107, 0.8);
            text-align: center;
        }

        .start-screen p {
            font-size: 24px;
            margin-bottom: 60px;
            color: rgba(255, 255, 255, 0.8);
            text-align: center;
        }

        .start-btn {
            padding: 20px 60px;
            background: linear-gradient(90deg, #ff6b6b 0%, #ffa500 100%);
            border: none;
            border-radius: 60px;
            color: white;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(255,107,107,0.5);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            min-width: 200px;
        }

        .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 30px rgba(255,107,107,0.6);
        }

        .start-btn:active {
            transform: scale(0.95);
        }

        .start-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 80%;
            max-width: 300px;
        }

        @media (min-width: 480px) {
            .start-buttons {
                flex-direction: row;
                justify-content: center;
            }
        }

        .game-over p {
            font-size: 24px;
            margin-bottom: 12px;
        }

        .game-over .target-tip {
            font-size: 20px;
            color: #ffd740;
            margin-bottom: 30px;
        }

        .restart-btn {
            padding: 16px 45px;
            background: linear-gradient(90deg, #ff6b6b 0%, #ffa500 100%);
            border: none;
            border-radius: 60px;
            color: white;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(255,107,107,0.4);
            transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            min-width: 180px;
        }

        .restart-btn:active {
            transform: scale(0.95);
        }

        .pause-menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            transform: translateZ(0);
            z-index: 150;
            backdrop-filter: blur(5px);
        }

        .pause-menu h2 {
            font-size: 40px;
            margin-bottom: 30px;
            text-shadow: 0 0 15px rgba(255,255,255,0.5);
        }

        .pause-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 80%;
            max-width: 300px;
        }

        @media (min-width: 480px) {
            .pause-buttons {
                flex-direction: row;
                justify-content: center;
            }
        }

        .particle {
            position: absolute;
            pointer-events: none;
            border-radius: 50%;
            animation: particle-fly 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes particle-fly {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1);
            }
            70% {
                opacity: 0.8;
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(0);
            }
        }

        /* 响应式调整 */
        @media (max-width: 480px) {
            .start-screen h1 {
                font-size: 48px;
            }
            
            .start-screen p {
                font-size: 20px;
                margin-bottom: 40px;
            }
            
            .start-btn {
                padding: 16px 50px;
                font-size: 24px;
            }
            
            .top-bar {
                padding: 12px;
            }
            
            .bomb-btn {
                width: 36px;
                height: 36px;
                font-size: 16px;
            }
            
            .level-info {
                font-size: 14px;
            }
            
            .score-info {
                font-size: 18px;
            }
            
            .target-info {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="fireworks" id="fireworks"></div>
    <div class="game-container">
        <div class="start-screen" id="startScreen">
            <h1>消灭星星</h1>
            <p>10×10网格版</p>
            <div class="start-buttons">
                <button class="start-btn" onclick="startGame()">开始游戏</button>
                <button class="start-btn" id="continueBtn" onclick="continueGame()" style="display: none;">继续游戏</button>
            </div>
        </div>
        <div class="top-bar" id="topBar" style="display: none;">
            <div>
                <div class="level-info">关卡: <span id="level">1</span></div>
                <div class="target-info">目标分数: <span id="targetScore">1200</span></div>
            </div>
            <div class="bomb-container">
                <button class="bomb-btn" id="bombBtn" onclick="useBomb()">💣</button>
                <div class="bomb-count">×<span id="bombCount">1</span></div>
            </div>
            <div class="top-right">
                <div class="score-info">总分: <span id="score">0</span></div>
                <button class="pause-btn" onclick="togglePause()">⏸</button>
            </div>
        </div>
        <div id="canvas-container" class="canvas-container" style="display: none;">
            <canvas id="gameCanvas"></canvas>
        </div>
        <div class="game-over" id="gameOver">
            <h2 id="gameOverTitle">🎉 恭喜通关！</h2>
            <p>当前总分: <span id="finalScore">0</span></p>
            <p class="target-tip">本关目标: <span id="showTargetScore">1200</span></p>
            <button class="restart-btn" id="restartBtn" onclick="handleRestart()">下一关</button>
        </div>
        <div class="pause-menu" id="pauseMenu" style="display: none;">
            <h2>游戏暂停</h2>
            <div class="pause-buttons">
                <button class="restart-btn" onclick="resumeGame()">继续游戏</button>
                <button class="restart-btn" onclick="saveAndExit()">保存并退出</button>
            </div>
        </div>
    </div>

    <script>
        const config = {
            rows: 10,       // 保持10行
            cols: 10,       // 核心修改：列数从7改为10
            starSize: 40,
            colors: ['#FF5252', '#FFD740', '#40C4FF', '#69F0AE', '#EA80FC'],
            level: 1,
            targetScore: 1000,
            totalScore: 0,
            bombs: 3, // 初始赠送3个炸弹
            starBorder: { width: 1, color: 'rgba(255, 255, 255, 0.2)', radius: 6 }, // 缩小圆角，适配更小的星星
            animation: {
                eliminateDelay: 200,    
                particleCount: 6,       // 进一步减少粒子数量，适配10×10的渲染压力
                dropSpeed: 4,           // 微调下落速度，适配更多星星
                easing: 0.2             
            },

        };

        let canvas, ctx;
        let starGrid = [];
        let isGameOver = false;
        let isPaused = false;
        let particles = [];
        let popSound = null;
        let victorySound = null;
        let animationFrameId = null;
        let scorePopups = [];
        let isAnimationInProgress = false;

        // 深度克隆函数 - 确保星星对象完全独立
        function deepClone(obj) {
            if (obj === null || typeof obj !== 'object') return obj;
            return JSON.parse(JSON.stringify(obj));
        }

        // 初始化音效
        function initSound() {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!AudioContext) return;
            
            const audioCtx = new AudioContext();
            
            popSound = function() {
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.1);
                
                gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 0.01);
                gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
                
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.2);
            };
            
            // 胜利音效 - 更热烈的庆祝效果
            victorySound = function() {
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                
                // 更丰富的胜利音效，模拟礼炮和庆祝声
                const frequencies = [
                    523.25, 659.25, 783.99, 1046.50, // C5, E5, G5, C6
                    1318.51, 1046.50, 783.99, 659.25  // E6, C6, G5, E5
                ];
                
                frequencies.forEach((freq, index) => {
                    const oscillator = audioCtx.createOscillator();
                    const gainNode = audioCtx.createGain();
                    
                    oscillator.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                    
                    // 混合不同波形，使声音更丰富
                    if (index % 2 === 0) {
                        oscillator.type = 'sine';
                    } else {
                        oscillator.type = 'triangle';
                    }
                    
                    oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime + index * 0.1);
                    
                    gainNode.gain.setValueAtTime(0, audioCtx.currentTime + index * 0.1);
                    gainNode.gain.linearRampToValueAtTime(0.35, audioCtx.currentTime + index * 0.1 + 0.01);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + index * 0.1 + 0.25);
                    
                    oscillator.start(audioCtx.currentTime + index * 0.1);
                    oscillator.stop(audioCtx.currentTime + index * 0.1 + 0.25);
                });
            };
        }

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('topBar').style.display = 'flex';
            document.getElementById('canvas-container').style.display = 'flex';
            initGame();
        }

        function initGame() {
            canvas = document.getElementById('gameCanvas');
            ctx = canvas.getContext('2d');
            
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'medium';
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.miterLimit = 2;
            
            initSound();
            
            const containerWidth = document.querySelector('.game-container').clientWidth;
            // 调整星星尺寸计算逻辑，留出更多边距，避免星星溢出
            config.starSize = Math.floor((containerWidth - 20) / config.cols);
            canvas.width = config.cols * config.starSize;
            canvas.height = config.rows * config.starSize;

            generateStarGrid();
            drawGame();
            bindEvents();
            updateUI();
            document.getElementById('gameOver').style.display = 'none';
            isGameOver = false;
            isAnimationInProgress = false;
        }

        // 生成星星网格 - 每个星星颜色完全随机且永久固定
        function generateStarGrid() {
            starGrid = Array(config.rows).fill(null).map(() => 
                Array(config.cols).fill(null).map(() => ({
                    color: config.colors[Math.floor(Math.random() * config.colors.length)],
                    isMatched: false,
                    colorLocked: true,
                    yOffset: 0,
                    isFalling: false
                }))
            );
        }

        // 颜色加深函数
        function darkenColor(color, percent) {
            let R = parseInt(color.substring(1,3),16);
            let G = parseInt(color.substring(3,5),16);
            let B = parseInt(color.substring(5,7),16);

            R = Math.max(0, Math.min(255, parseInt(R * (100 - percent) / 100)));
            G = Math.max(0, Math.min(255, parseInt(G * (100 - percent) / 100)));
            B = Math.max(0, Math.min(255, parseInt(B * (100 - percent) / 100)));

            return `#${R.toString(16).padStart(2, '0')}${G.toString(16).padStart(2, '0')}${B.toString(16).padStart(2, '0')}`;
        }

        // 颜色提亮函数
        function lightenColor(color, percent) {
            let R = parseInt(color.substring(1,3),16);
            let G = parseInt(color.substring(3,5),16);
            let B = parseInt(color.substring(5,7),16);

            R = Math.max(0, Math.min(255, parseInt(R * (100 + percent) / 100)));
            G = Math.max(0, Math.min(255, parseInt(G * (100 + percent) / 100)));
            B = Math.max(0, Math.min(255, parseInt(B * (100 + percent) / 100)));

            return `#${R.toString(16).padStart(2, '0')}${G.toString(16).padStart(2, '0')}${B.toString(16).padStart(2, '0')}`;
        }

        function drawGame() {
            // 清除画布，保持透明背景，让烟花效果透出来
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for (let row = 0; row < config.rows; row++) {
                for (let col = 0; col < config.cols; col++) {
                    const star = starGrid[row][col];
                    if (star) {
                        const yPos = row * config.starSize + config.starSize/2 + star.yOffset;
                        drawStar(
                            col * config.starSize + config.starSize/2,
                            yPos,
                            star.color,
                            star.isMatched,
                            star.opacity || 1
                        );
                    }
                }
            }
            drawParticles();
            drawScorePopups();
        }

        // 核心：骰子面+雕刻凸起星星效果（适配更小的星星尺寸）
        function drawStar(x, y, baseColor, isMatched, opacity = 1) {
            ctx.save();
            ctx.translate(x, y);
            ctx.globalAlpha = (isMatched ? 0.7 : 1) * opacity;

            // 适配更小的星星，缩小方块尺寸
            const boxSize = config.starSize - 3;
            const boxX = -boxSize/2;
            const boxY = -boxSize/2;
            
            ctx.beginPath();
            ctx.roundRect(boxX, boxY, boxSize, boxSize, config.starBorder.radius);
            
            const boxGradient = ctx.createLinearGradient(boxX, boxY, boxX + boxSize, boxY + boxSize);
            boxGradient.addColorStop(0, lightenColor(baseColor, 10));
            boxGradient.addColorStop(1, darkenColor(baseColor, 15));
            ctx.fillStyle = boxGradient;
            ctx.fill();
            
            ctx.strokeStyle = config.starBorder.color;
            ctx.lineWidth = config.starBorder.width;
            ctx.stroke();
            
            ctx.shadowColor = 'rgba(0,0,0,0.3)';
            ctx.shadowBlur = 3; // 缩小阴影模糊度，适配小尺寸
            ctx.shadowOffsetX = 1; // 缩小阴影偏移
            ctx.shadowOffsetY = 1;

            // 适配小尺寸，调整星星占比
            const starSize = boxSize * 0.75; 
            const outerRadius = starSize / 2;
            const innerRadius = outerRadius * 0.45;
            const roundness = 0.3; // 略微降低圆润度，让小星星更清晰
            
            ctx.save();
            ctx.translate(1, 1); 
            drawStarPath(outerRadius, innerRadius, roundness);
            ctx.fillStyle = darkenColor(baseColor, 30);
            ctx.fill();
            ctx.restore();
            
            drawStarPath(outerRadius, innerRadius, roundness);
            
            const starGradient = ctx.createRadialGradient(
                -outerRadius/3, -outerRadius/3, 0,
                -outerRadius/3, -outerRadius/3, outerRadius
            );
            starGradient.addColorStop(0, lightenColor(baseColor, 40));
            starGradient.addColorStop(0.7, lightenColor(baseColor, 15));
            starGradient.addColorStop(1, baseColor);
            ctx.fillStyle = starGradient;
            ctx.fill();
            
            // 微调描边宽度，适配小尺寸星星
            ctx.strokeStyle = lightenColor(baseColor, 25);
            ctx.lineWidth = 0.6; 
            ctx.stroke();
            
            // 缩小高光点缀，适配小尺寸
            ctx.beginPath();
            ctx.ellipse(-outerRadius/3, -outerRadius/3, outerRadius/6, outerRadius/7, 0, 0, Math.PI*2);
            ctx.fillStyle = 'rgba(255,255,255,0.6)';
            ctx.fill();
            
            ctx.shadowColor = 'transparent';
            ctx.shadowBlur = 0;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 0;
            
            ctx.restore();
        }

        // 提取星星路径绘制函数
        function drawStarPath(outerRadius, innerRadius, roundness) {
            ctx.beginPath();
            for (let i = 0; i < 10; i++) {
                const isOuter = i % 2 === 0;
                const radius = isOuter ? outerRadius : innerRadius;
                const angle = (i / 10) * Math.PI * 2 - Math.PI/2;
                const px = Math.cos(angle) * radius;
                const py = Math.sin(angle) * radius;
                
                if (i === 0) {
                    ctx.moveTo(px, py);
                } else {
                    const cp1x = Math.cos(angle) * radius * (1 - roundness);
                    const cp1y = Math.sin(angle) * radius * (1 - roundness);
                    ctx.quadraticCurveTo(cp1x, cp1y, px, py);
                }
            }
            ctx.closePath();
        }

        function shadeColor(color, percent) {
            let R = parseInt(color.substring(1,3),16);
            let G = parseInt(color.substring(3,5),16);
            let B = parseInt(color.substring(5,7),16);

            R = Math.max(0, Math.min(255, parseInt(R * (100 + percent) / 100)));
            G = Math.max(0, Math.min(255, parseInt(G * (100 + percent) / 100)));
            B = Math.max(0, Math.min(255, parseInt(B * (100 + percent) / 100)));

            return `#${R.toString(16).padStart(2, '0')}${G.toString(16).padStart(2, '0')}${B.toString(16).padStart(2, '0')}`;
        }

        function drawParticles() {
            ctx.save();
            particles.forEach(p => {
                ctx.globalAlpha = p.opacity;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.restore();
        }

        function createParticles(x, y, color, count = config.animation.particleCount) {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 8 + 3; // 增加粒子速度
                const size = Math.random() * 3 + 1; // 增加粒子尺寸变化
                particles.push({
                    x: x, y: y, 
                    size: size,
                    color: color,
                    opacity: 1, 
                    vx: Math.cos(angle) * speed, 
                    vy: Math.sin(angle) * speed, 
                    life: 1,
                    gravity: 0.1 + Math.random() * 0.1, // 随机重力
                    friction: 0.98 // 摩擦系数
                });
            }
        }

        function updateParticles() {
            particles = particles.filter(p => {
                // 应用摩擦
                p.vx *= p.friction;
                p.vy *= p.friction;
                
                // 应用重力
                p.vy += p.gravity;
                
                // 更新位置
                p.x += p.vx;
                p.y += p.vy;
                
                // 粒子生命周期
                p.life -= 0.03; // 延长生命周期
                p.opacity = p.life * p.life;
                
                // 粒子大小随生命周期变化
                p.size = p.size * 0.99;
                
                return p.life > 0 && p.size > 0.1;
            });
        }

        function updateScorePopups() {
            scorePopups = scorePopups.filter(popup => {
                popup.y += popup.vy;
                popup.life -= 0.02; // 延长生命周期
                popup.opacity = popup.life;
                // 分数飘字缩放动画
                if (popup.scale < popup.scaleTarget) {
                    popup.scale += 0.05; // 缓慢放大
                    if (popup.scale > popup.scaleTarget) {
                        popup.scale = popup.scaleTarget;
                    }
                }
                return popup.life > 0;
            });
        }

        function drawScorePopups() {
            ctx.save();
            scorePopups.forEach(popup => {
                ctx.globalAlpha = popup.opacity;
                ctx.font = `bold ${16 * popup.scale}px Arial`;
                ctx.fillStyle = '#FFD740';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
                ctx.shadowBlur = 3;
                ctx.shadowOffsetX = 1;
                ctx.shadowOffsetY = 1;
                ctx.fillText(`+${popup.score}`, popup.x, popup.y);
            });
            ctx.restore();
        }

        function bindEvents() {
            canvas.addEventListener('click', handleClick);
            canvas.addEventListener('touchstart', function(e) {
                e.preventDefault();
                const touch = e.touches[0];
                const rect = canvas.getBoundingClientRect();
                handleClickAt(touch.clientX - rect.left, touch.clientY - rect.top);
            });
        }

        function handleClick(e) {
            const rect = canvas.getBoundingClientRect();
            handleClickAt(e.clientX - rect.left, e.clientY - rect.top);
        }

        function handleClickAt(x, y) {
            if (isGameOver || isAnimationInProgress || isPaused) return;
            
            const col = Math.floor(x / config.starSize);
            const row = Math.floor(y / config.starSize);
            
            if (row < 0 || row >= config.rows || col < 0 || col >= config.cols || !starGrid[row][col]) return;
            
            const targetStar = starGrid[row][col];
            const matchedStars = findMatchedStars(row, col, targetStar.color);
            
            if (matchedStars.length >= 2) {
                // 立即设置动画标志，防止重复点击
                isAnimationInProgress = true;
                
                // 立即播放音效
                if (popSound) popSound();
                
                // 计算得分
                const scoreAdd = Math.pow(matchedStars.length, 2) * 5;
                config.totalScore += Math.floor(scoreAdd);
                
                // 计算消除的中心点
                let centerX = 0;
                let centerY = 0;
                matchedStars.forEach(({r, c}) => {
                    centerX += c * config.starSize + config.starSize/2;
                    centerY += r * config.starSize + config.starSize/2;
                    if (starGrid[r][c]) {
                        starGrid[r][c].isMatched = true;
                        starGrid[r][c].opacity = 1;
                        // 立即创建粒子效果
                        createParticles(
                            c * config.starSize + config.starSize/2,
                            r * config.starSize + config.starSize/2,
                            starGrid[r][c].color
                        );
                    }
                });
                centerX /= matchedStars.length;
                centerY /= matchedStars.length;
                
                // 立即创建分数飘字
                scorePopups.push({
                    x: centerX,
                    y: centerY,
                    score: scoreAdd,
                    opacity: 1,
                    scale: 0.5,
                    scaleTarget: 1.2,
                    vy: -3,
                    life: 1
                });
                

                
                // 立即更新UI
                updateUI();
                
                // 立即绘制一帧，提供即时视觉反馈
                drawGame();
                
                // 开始快速消除动画
                let animationStep = 0;
                const maxSteps = 2; // 进一步减少步骤，加快动画
                
                const eliminationAnimation = () => {
                    animationStep++;
                    
                    // 快速降低匹配星星的透明度
                    matchedStars.forEach(({r, c}) => {
                        if (starGrid[r][c]) {
                            starGrid[r][c].opacity = 1 - (animationStep / maxSteps);
                        }
                    });
                    
                    drawGame();
                    
                    if (animationStep < maxSteps) {
                        requestAnimationFrame(eliminationAnimation);
                    } else {
                        // 动画完成后移除星星并处理下落
                        removeMatchedStars();
                        animateStarDrop();
                        
                        if (animationFrameId) {
                            cancelAnimationFrame(animationFrameId);
                        }
                        
                        const gameLoop = () => {
                            updateParticles();
                            updateScorePopups();
                            updateStarPositions();
                            drawGame();
                            if (particles.length > 0 || checkStarsFalling() || scorePopups.length > 0) {
                                animationFrameId = requestAnimationFrame(gameLoop);
                            } else {
                                // 所有动画完成后再重置标志
                                isAnimationInProgress = false;
                                updateUI();
                                drawGame();
                                // 自动保存游戏状态
                                saveGameState();
                                if (checkAllStarsEliminated()) {
                                    // Check if we should automatically use a bomb
                                    if (config.totalScore < config.targetScore && config.bombs > 0) {
                                        // Auto-use bomb
                                        setTimeout(() => {
                                            useBomb();
                                        }, 500);
                                    } else {
                                        judgeGameResult();
                                    }
                                }
                            }
                        };
                        gameLoop();
                    }
                };
                
                eliminationAnimation();
            }
        }

        function animateStarDrop() {
            for (let col = 0; col < config.cols; col++) {
                let emptySpaces = 0;
                for (let row = config.rows - 1; row >= 0; row--) {
                    if (!starGrid[row][col]) {
                        emptySpaces++;
                    } else if (emptySpaces > 0) {
                        starGrid[row][col].isFalling = true;
                        starGrid[row][col].yOffset = emptySpaces * config.starSize;
                    }
                }
            }
        }

        function updateStarPositions() {
            let stillFalling = false;
            for (let row = 0; row < config.rows; row++) {
                for (let col = 0; col < config.cols; col++) {
                    const star = starGrid[row][col];
                    if (star && star.isFalling) {
                        star.yOffset -= (star.yOffset * config.animation.easing) + config.animation.dropSpeed;
                        if (star.yOffset <= 0) {
                            star.yOffset = 0;
                            star.isFalling = false;
                        } else {
                            stillFalling = true;
                        }
                    }
                }
            }
            if (!stillFalling) {
                dropStarsNaturally();
                fillEmptyColumns();
            }
        }

        function checkStarsFalling() {
            for (let row = 0; row < config.rows; row++) {
                for (let col = 0; col < config.cols; col++) {
                    const star = starGrid[row][col];
                    if (star && star.isFalling) {
                        return true;
                    }
                }
            }
            return false;
        }

        function findMatchedStars(startRow, startCol, color) {
            const matched = [];
            const visited = Array(config.rows).fill(null).map(() => Array(config.cols).fill(false));
            
            function dfs(row, col) {
                if (row < 0 || row >= config.rows || col < 0 || col >= config.cols) return;
                if (visited[row][col] || !starGrid[row][col] || starGrid[row][col].color !== color) return;
                
                visited[row][col] = true;
                matched.push({r: row, c: col});
                
                dfs(row - 1, col);
                dfs(row + 1, col);
                dfs(row, col - 1);
                dfs(row, col + 1);
            }
            
            dfs(startRow, startCol);
            return matched;
        }

        function removeMatchedStars() {
            for (let row = 0; row < config.rows; row++) {
                for (let col = 0; col < config.cols; col++) {
                    if (starGrid[row][col] && starGrid[row][col].isMatched) {
                        starGrid[row][col] = null;
                    }
                }
            }
        }

        function dropStarsNaturally() {
            for (let col = 0; col < config.cols; col++) {
                const validStars = [];
                for (let row = config.rows - 1; row >= 0; row--) {
                    if (starGrid[row][col] !== null) {
                        const clonedStar = deepClone(starGrid[row][col]);
                        clonedStar.isMatched = false;
                        clonedStar.yOffset = 0;
                        clonedStar.isFalling = false;
                        validStars.push(clonedStar);
                    }
                }
                
                const newColData = Array(config.rows).fill(null);
                for (let i = 0; i < validStars.length; i++) {
                    newColData[config.rows - 1 - i] = validStars[i];
                }
                
                for (let row = 0; row < config.rows; row++) {
                    starGrid[row][col] = newColData[row];
                }
            }
        }

        function fillEmptyColumns() {
            const validColumns = [];
            for (let col = 0; col < config.cols; col++) {
                let hasStars = false;
                for (let row = 0; row < config.rows; row++) {
                    if (starGrid[row][col] !== null) {
                        hasStars = true;
                        break;
                    }
                }
                if (hasStars) {
                    const clonedCol = [];
                    for (let row = 0; row < config.rows; row++) {
                        clonedCol.push(deepClone(starGrid[row][col]));
                    }
                    validColumns.push(clonedCol);
                }
            }
            
            const newGrid = Array(config.rows).fill(null).map(() => Array(config.cols).fill(null));
            for (let col = 0; col < validColumns.length; col++) {
                for (let row = 0; row < config.rows; row++) {
                    newGrid[row][col] = validColumns[col][row];
                }
            }
            
            starGrid = newGrid;
        }

        function checkAllStarsEliminated() {
            for (let row = 0; row < config.rows; row++) {
                for (let col = 0; col < config.cols; col++) {
                    const star = starGrid[row][col];
                    if (!star) continue;
                    
                    const color = star.color;
                    if (
                        (row > 0 && starGrid[row-1][col] && starGrid[row-1][col].color === color) ||
                        (row < config.rows-1 && starGrid[row+1][col] && starGrid[row+1][col].color === color) ||
                        (col > 0 && starGrid[row][col-1] && starGrid[row][col-1].color === color) ||
                        (col < config.cols-1 && starGrid[row][col+1] && starGrid[row][col+1].color === color)
                    ) {
                        return false;
                    }
                }
            }
            return true;
        }

        function createConfetti(x, y, count = 50) {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 8 + 4;
                const size = Math.random() * 4 + 2;
                const color = config.colors[Math.floor(Math.random() * config.colors.length)];
                
                particles.push({
                    x: x,
                    y: y,
                    size: size,
                    color: color,
                    opacity: 1,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 1.5,
                    gravity: 0.2,
                    friction: 0.96
                });
            }
        }

        function judgeGameResult() {
            isGameOver = true;
            const gameOverTitle = document.getElementById('gameOverTitle');
            const restartBtn = document.getElementById('restartBtn');
            const finalScoreEl = document.getElementById('finalScore');
            const showTargetScoreEl = document.getElementById('showTargetScore');
            
            // 计算剩余星星数量
            let remainingStars = 0;
            for (let row = 0; row < config.rows; row++) {
                for (let col = 0; col < config.cols; col++) {
                    if (starGrid[row][col] !== null) {
                        remainingStars++;
                    }
                }
            }
            
            // 计算终局奖励
            let bonus = 0;
            if (remainingStars <= 10) {
                bonus = 2000 - (remainingStars * 5);
                config.totalScore += bonus;
            }
            
            finalScoreEl.textContent = config.totalScore;
            showTargetScoreEl.textContent = config.targetScore;
            
            if (config.totalScore >= config.targetScore) {
                gameOverTitle.textContent = '🎉 恭喜通关！';
                restartBtn.textContent = '下一关';
                if (victorySound) victorySound();
                
                // 创建庆祝特效
                const centerX = canvas.width / 2;
                const centerY = canvas.height / 2;
                createConfetti(centerX, centerY, 100);
                
                // 播放庆祝动画
                const gameLoop = () => {
                    updateParticles();
                    drawGame();
                    if (particles.length > 0) {
                        animationFrameId = requestAnimationFrame(gameLoop);
                    }
                };
                gameLoop();
            } else {
                gameOverTitle.textContent = '💔 挑战失败';
                restartBtn.textContent = '重新开始';
            }
            
            document.getElementById('gameOver').style.display = 'flex';
        }

        function updateUI() {
            document.getElementById('score').textContent = config.totalScore;
            document.getElementById('level').textContent = config.level;
            document.getElementById('targetScore').textContent = config.targetScore;
            document.getElementById('bombCount').textContent = config.bombs;
            document.getElementById('bombBtn').disabled = config.bombs <= 0 || isGameOver || isAnimationInProgress;
        }

        function calculateTargetScore(level) {
            if (level === 1) return 1000;
            if (level <= 5) return 1000 + (level - 1) * 1600;
            if (level <= 10) return 7400 + (level - 5) * 2200;
            if (level <= 20) return 18400 + (level - 10) * 3200;
            if (level <= 35) return 49600 + (level - 20) * 4800;
            if (level <= 50) return 121600 + (level - 35) * 5800;
            if (level <= 100) return 214400 + (level - 50) * 6500;
            return 545900 + (level - 100) * 7800;
        }

        function useBomb() {
            if (config.bombs <= 0 || isGameOver || isAnimationInProgress || isPaused) return;
            
            isAnimationInProgress = true;
            config.bombs--;
            updateUI();
            
            // 收集所有星星
            const allStars = [];
            for (let row = 0; row < config.rows; row++) {
                for (let col = 0; col < config.cols; col++) {
                    if (starGrid[row][col]) {
                        allStars.push({r: row, c: col, color: starGrid[row][col].color});
                    }
                }
            }
            
            if (allStars.length === 0) {
                isAnimationInProgress = false;
                return;
            }
            
            // 播放爆炸音效
            if (popSound) popSound();
            
            let currentIndex = 0;
            const explosionDelay = 50; // 每个星星爆炸的延迟时间
            
            const explodeNextStar = () => {
                if (currentIndex >= allStars.length) {
                    // 所有星星都爆炸完了
                    removeMatchedStars();
                    animateStarDrop();
                    
                    // 立即重置动画标志，让炸弹按钮尽快可用
                    isAnimationInProgress = false;
                    updateUI();
                    
                    if (animationFrameId) {
                        cancelAnimationFrame(animationFrameId);
                    }
                    
                    const gameLoop = () => {
                        updateParticles();
                        updateScorePopups();
                        updateStarPositions();
                        drawGame();
                        if (particles.length > 0 || checkStarsFalling() || scorePopups.length > 0) {
                            animationFrameId = requestAnimationFrame(gameLoop);
                        } else {
                            drawGame();
                            // 自动保存游戏状态
                            saveGameState();
                            if (checkAllStarsEliminated()) {
                                judgeGameResult();
                            }
                        }
                    };
                    gameLoop();
                    return;
                }
                
                const star = allStars[currentIndex];
                const {r, c, color} = star;
                
                if (starGrid[r][c]) {
                    // 标记星星为已匹配
                    starGrid[r][c].isMatched = true;
                    starGrid[r][c].opacity = 0.5;
                    
                    // 创建爆炸粒子效果
                    createParticles(
                        c * config.starSize + config.starSize/2,
                        r * config.starSize + config.starSize/2,
                        color,
                        10 // 增加粒子数量
                    );
                    
                    // 计算得分 - 按照规则：(消除星星数量)^2 × 5
                    const scoreAdd = Math.pow(1, 2) * 5; // 每个星星单独消除的得分
                    config.totalScore += scoreAdd;
                    
                    // 创建分数飘字
                    scorePopups.push({
                        x: c * config.starSize + config.starSize/2,
                        y: r * config.starSize + config.starSize/2,
                        score: scoreAdd,
                        opacity: 1,
                        scale: 0.5,
                        scaleTarget: 1.2,
                        vy: -2,
                        life: 1
                    });
                    
                    // 绘制当前帧
                    drawGame();
                }
                
                currentIndex++;
                setTimeout(explodeNextStar, explosionDelay);
            };
            
            // 开始爆炸动画
            explodeNextStar();
        }

        function handleRestart() {
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
            }
            particles = [];
            scorePopups = [];
            isAnimationInProgress = false;
            
            const restartBtn = document.getElementById('restartBtn');
            if (restartBtn.textContent === '下一关') {
                config.level++;
                config.targetScore = calculateTargetScore(config.level);
                // 每过10关获得一个炸弹（从第10关开始）
                if (config.level % 10 === 0) {
                    config.bombs++;
                }
                // 保存游戏状态
                saveGameState();
            } else {
                // 重新开始游戏，重置为3个炸弹
                config.level = 1;
                config.totalScore = 0;
                config.targetScore = calculateTargetScore(config.level);
                config.bombs = 3;
                // 清除保存的游戏状态
                localStorage.removeItem('starGameState');
            }
            initGame();
        }

        window.addEventListener('beforeunload', () => {
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
            }
        });

        window.addEventListener('load', function() {
            // 页面加载时只显示开始屏幕，不自动初始化游戏
        });
        
        document.addEventListener('click', function() {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (AudioContext && !popSound) {
                initSound();
            }
        }, { once: true });

        // 保存游戏状态
        function saveGameState() {
            const gameState = {
                level: config.level,
                totalScore: config.totalScore,
                bombs: config.bombs,
                targetScore: config.targetScore,
                starGrid: starGrid,
                timestamp: Date.now()
            };
            localStorage.setItem('starGameState', JSON.stringify(gameState));
        }

        // 加载游戏状态
        function loadGameState() {
            const savedState = localStorage.getItem('starGameState');
            if (savedState) {
                try {
                    const gameState = JSON.parse(savedState);
                    config.level = gameState.level;
                    config.totalScore = gameState.totalScore;
                    config.bombs = gameState.bombs;
                    config.targetScore = gameState.targetScore;
                    starGrid = gameState.starGrid;
                    return true;
                } catch (e) {
                    console.error('Failed to load game state:', e);
                    return false;
                }
            }
            return false;
        }

        // 检查是否有保存的游戏
        function hasSavedGame() {
            return localStorage.getItem('starGameState') !== null;
        }

        // 烟花和星星效果
        function createStars() {
            const fireworksContainer = document.getElementById('fireworks');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                star.style.animationDuration = (Math.random() * 2 + 2) + 's';
                fireworksContainer.appendChild(star);
            }
        }

        function createFirework() {
            const fireworksContainer = document.getElementById('fireworks');
            const firework = document.createElement('div');
            firework.className = 'firework';
            firework.style.left = Math.random() * 100 + '%';
            firework.style.top = Math.random() * 100 + '%';
            
            const colors = ['#ff6b6b', '#4ecdc4', '#45b7d1', '#96ceb4', '#ffeead', '#d9534f', '#5bc0de', '#f0ad4e', '#5cb85c'];
            firework.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            
            fireworksContainer.appendChild(firework);
            
            // 生成火花
            setTimeout(() => {
                for (let i = 0; i < 50; i++) {
                    const spark = document.createElement('div');
                    spark.className = 'spark';
                    spark.style.left = firework.style.left;
                    spark.style.top = firework.style.top;
                    spark.style.backgroundColor = firework.style.backgroundColor;
                    spark.style.animationDelay = Math.random() * 0.5 + 's';
                    fireworksContainer.appendChild(spark);
                    
                    setTimeout(() => {
                        spark.remove();
                    }, 1000);
                }
            }, 1500);
            
            setTimeout(() => {
                firework.remove();
            }, 3000);
        }

        // 继续游戏函数
        function continueGame() {
            if (loadGameState()) {
                document.getElementById('startScreen').style.display = 'none';
                document.getElementById('topBar').style.display = 'flex';
                document.getElementById('canvas-container').style.display = 'flex';
                initGame();
                updateUI();
                drawGame();
            }
        }

        // 切换暂停状态
        function togglePause() {
            isPaused = !isPaused;
            const pauseMenu = document.getElementById('pauseMenu');
            if (isPaused) {
                pauseMenu.style.display = 'flex';
            } else {
                pauseMenu.style.display = 'none';
            }
        }

        // 继续游戏
        function resumeGame() {
            isPaused = false;
            document.getElementById('pauseMenu').style.display = 'none';
        }

        // 保存并退出游戏
        function saveAndExit() {
            saveGameState();
            location.reload();
        }

        // 初始化效果
        window.addEventListener('load', function() {
            createStars();
            setInterval(createFirework, 2000);
            // 检查是否有保存的游戏
            if (hasSavedGame()) {
                document.getElementById('continueBtn').style.display = 'block';
            }
        });
    </script>
</body>
