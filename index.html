<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>消灭星星全新版 - 10×10网格版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: manipulation;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            transform: translateZ(0);
            will-change: transform;
        }

        .game-container {
            position: relative;
            width: 100%;
            max-width: 450px; /* 微调容器宽度，适配10列 */
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            overflow: hidden;
            backdrop-filter: blur(10px);
            transform: translateZ(0);
            will-change: transform;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px; /* 缩小顶部栏内边距，腾出更多游戏空间 */
            background: linear-gradient(90deg, #ff6b6b 0%, #ffa500 100%);
            color: white;
        }

        .level-info {
            font-size: 14px; /* 缩小字体，适配紧凑布局 */
            font-weight: bold;
        }

        .score-info {
            font-size: 18px; /* 缩小字体 */
            font-weight: bold;
        }

        .target-info {
            font-size: 12px; /* 缩小字体 */
            font-weight: normal;
            margin-top: 3px;
            color: rgba(255,255,255,0.9);
        }

        #gameCanvas {
            width: 100%;
            display: block;
            background: linear-gradient(180deg, #2c3e50 0%, #34495e 100%);
            image-rendering: optimizeSpeed;
            image-rendering: -webkit-optimize-contrast;
        }

        .game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            transform: translateZ(0);
        }

        .game-over h2 {
            font-size: 32px; /* 微调字体 */
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        .game-over p {
            font-size: 20px; /* 微调字体 */
            margin-bottom: 8px;
        }

        .game-over .target-tip {
            font-size: 16px; /* 微调字体 */
            color: #ffd740;
            margin-bottom: 25px;
        }

        .restart-btn {
            padding: 12px 35px; /* 微调按钮尺寸 */
            background: linear-gradient(90deg, #ff6b6b 0%, #ffa500 100%);
            border: none;
            border-radius: 50px;
            color: white;
            font-size: 18px; /* 微调字体 */
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255,107,107,0.4);
            transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .restart-btn:active {
            transform: scale(0.95);
        }

        .particle {
            position: absolute;
            pointer-events: none;
            border-radius: 50%;
            animation: particle-fly 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes particle-fly {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1);
            }
            70% {
                opacity: 0.8;
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(0);
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="top-bar">
            <div>
                <div class="level-info">关卡: <span id="level">1</span></div>
                <div class="target-info">目标分数: <span id="targetScore">1200</span></div>
            </div>
            <div class="score-info">总分: <span id="score">0</span></div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div class="game-over" id="gameOver">
            <h2 id="gameOverTitle">🎉 恭喜通关！</h2>
            <p>当前总分: <span id="finalScore">0</span></p>
            <p class="target-tip">本关目标: <span id="showTargetScore">1200</span></p>
            <button class="restart-btn" id="restartBtn" onclick="handleRestart()">下一关</button>
        </div>
    </div>

    <script>
        const config = {
            rows: 10,       // 保持10行
            cols: 10,       // 核心修改：列数从7改为10
            starSize: 40,
            colors: ['#FF5252', '#FFD740', '#40C4FF', '#69F0AE', '#EA80FC'],
            level: 1,
            targetScore: 1000,
            totalScore: 0,
            starBorder: { width: 1, color: 'rgba(255, 255, 255, 0.2)', radius: 6 }, // 缩小圆角，适配更小的星星
            animation: {
                eliminateDelay: 200,    
                particleCount: 6,       // 进一步减少粒子数量，适配10×10的渲染压力
                dropSpeed: 4,           // 微调下落速度，适配更多星星
                easing: 0.2             
            },
            combo: {
                counter: 0,
                maxTime: 1000, // 最大间隔时间（毫秒）
                lastTime: 0
            }
        };

        let canvas, ctx;
        let starGrid = [];
        let isGameOver = false;
        let particles = [];
        let popSound = null;
        let animationFrameId = null;
        let scorePopups = [];
        let comboTexts = [];

        // 深度克隆函数 - 确保星星对象完全独立
        function deepClone(obj) {
            if (obj === null || typeof obj !== 'object') return obj;
            return JSON.parse(JSON.stringify(obj));
        }

        // 初始化音效
        function initSound() {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!AudioContext) return;
            
            const audioCtx = new AudioContext();
            
            popSound = function() {
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.1);
                
                gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 0.01);
                gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
                
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.2);
            };
        }

        function initGame() {
            canvas = document.getElementById('gameCanvas');
            ctx = canvas.getContext('2d');
            
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'medium';
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.miterLimit = 2;
            
            initSound();
            
            const containerWidth = document.querySelector('.game-container').clientWidth;
            // 调整星星尺寸计算逻辑，留出更多边距，避免星星溢出
            config.starSize = Math.floor((containerWidth - 20) / config.cols);
            canvas.width = config.cols * config.starSize;
            canvas.height = config.rows * config.starSize;

            generateStarGrid();
            drawGame();
            bindEvents();
            updateUI();
            document.getElementById('gameOver').style.display = 'none';
            isGameOver = false;
        }

        // 生成星星网格 - 每个星星颜色完全随机且永久固定
        function generateStarGrid() {
            starGrid = Array(config.rows).fill(null).map(() => 
                Array(config.cols).fill(null).map(() => ({
                    color: config.colors[Math.floor(Math.random() * config.colors.length)],
                    isMatched: false,
                    colorLocked: true,
                    yOffset: 0,
                    isFalling: false
                }))
            );
        }

        // 颜色加深函数
        function darkenColor(color, percent) {
            let R = parseInt(color.substring(1,3),16);
            let G = parseInt(color.substring(3,5),16);
            let B = parseInt(color.substring(5,7),16);

            R = Math.max(0, Math.min(255, parseInt(R * (100 - percent) / 100)));
            G = Math.max(0, Math.min(255, parseInt(G * (100 - percent) / 100)));
            B = Math.max(0, Math.min(255, parseInt(B * (100 - percent) / 100)));

            return `#${R.toString(16).padStart(2, '0')}${G.toString(16).padStart(2, '0')}${B.toString(16).padStart(2, '0')}`;
        }

        // 颜色提亮函数
        function lightenColor(color, percent) {
            let R = parseInt(color.substring(1,3),16);
            let G = parseInt(color.substring(3,5),16);
            let B = parseInt(color.substring(5,7),16);

            R = Math.max(0, Math.min(255, parseInt(R * (100 + percent) / 100)));
            G = Math.max(0, Math.min(255, parseInt(G * (100 + percent) / 100)));
            B = Math.max(0, Math.min(255, parseInt(B * (100 + percent) / 100)));

            return `#${R.toString(16).padStart(2, '0')}${G.toString(16).padStart(2, '0')}${B.toString(16).padStart(2, '0')}`;
        }

        function drawGame() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for (let row = 0; row < config.rows; row++) {
                for (let col = 0; col < config.cols; col++) {
                    const star = starGrid[row][col];
                    if (star) {
                        const yPos = row * config.starSize + config.starSize/2 + star.yOffset;
                        drawStar(
                            col * config.starSize + config.starSize/2,
                            yPos,
                            star.color,
                            star.isMatched,
                            star.opacity || 1
                        );
                    }
                }
            }
            drawParticles();
            drawScorePopups();
            drawComboTexts();
        }

        // 核心：骰子面+雕刻凸起星星效果（适配更小的星星尺寸）
        function drawStar(x, y, baseColor, isMatched, opacity = 1) {
            ctx.save();
            ctx.translate(x, y);
            ctx.globalAlpha = (isMatched ? 0.7 : 1) * opacity;

            // 适配更小的星星，缩小方块尺寸
            const boxSize = config.starSize - 3;
            const boxX = -boxSize/2;
            const boxY = -boxSize/2;
            
            ctx.beginPath();
            ctx.roundRect(boxX, boxY, boxSize, boxSize, config.starBorder.radius);
            
            const boxGradient = ctx.createLinearGradient(boxX, boxY, boxX + boxSize, boxY + boxSize);
            boxGradient.addColorStop(0, lightenColor(baseColor, 10));
            boxGradient.addColorStop(1, darkenColor(baseColor, 15));
            ctx.fillStyle = boxGradient;
            ctx.fill();
            
            ctx.strokeStyle = config.starBorder.color;
            ctx.lineWidth = config.starBorder.width;
            ctx.stroke();
            
            ctx.shadowColor = 'rgba(0,0,0,0.3)';
            ctx.shadowBlur = 3; // 缩小阴影模糊度，适配小尺寸
            ctx.shadowOffsetX = 1; // 缩小阴影偏移
            ctx.shadowOffsetY = 1;

            // 适配小尺寸，调整星星占比
            const starSize = boxSize * 0.75; 
            const outerRadius = starSize / 2;
            const innerRadius = outerRadius * 0.45;
            const roundness = 0.3; // 略微降低圆润度，让小星星更清晰
            
            ctx.save();
            ctx.translate(1, 1); 
            drawStarPath(outerRadius, innerRadius, roundness);
            ctx.fillStyle = darkenColor(baseColor, 30);
            ctx.fill();
            ctx.restore();
            
            drawStarPath(outerRadius, innerRadius, roundness);
            
            const starGradient = ctx.createRadialGradient(
                -outerRadius/3, -outerRadius/3, 0,
                -outerRadius/3, -outerRadius/3, outerRadius
            );
            starGradient.addColorStop(0, lightenColor(baseColor, 40));
            starGradient.addColorStop(0.7, lightenColor(baseColor, 15));
            starGradient.addColorStop(1, baseColor);
            ctx.fillStyle = starGradient;
            ctx.fill();
            
            // 微调描边宽度，适配小尺寸星星
            ctx.strokeStyle = lightenColor(baseColor, 25);
            ctx.lineWidth = 0.6; 
            ctx.stroke();
            
            // 缩小高光点缀，适配小尺寸
            ctx.beginPath();
            ctx.ellipse(-outerRadius/3, -outerRadius/3, outerRadius/6, outerRadius/7, 0, 0, Math.PI*2);
            ctx.fillStyle = 'rgba(255,255,255,0.6)';
            ctx.fill();
            
            ctx.shadowColor = 'transparent';
            ctx.shadowBlur = 0;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 0;
            
            ctx.restore();
        }

        // 提取星星路径绘制函数
        function drawStarPath(outerRadius, innerRadius, roundness) {
            ctx.beginPath();
            for (let i = 0; i < 10; i++) {
                const isOuter = i % 2 === 0;
                const radius = isOuter ? outerRadius : innerRadius;
                const angle = (i / 10) * Math.PI * 2 - Math.PI/2;
                const px = Math.cos(angle) * radius;
                const py = Math.sin(angle) * radius;
                
                if (i === 0) {
                    ctx.moveTo(px, py);
                } else {
                    const cp1x = Math.cos(angle) * radius * (1 - roundness);
                    const cp1y = Math.sin(angle) * radius * (1 - roundness);
                    ctx.quadraticCurveTo(cp1x, cp1y, px, py);
                }
            }
            ctx.closePath();
        }

        function shadeColor(color, percent) {
            let R = parseInt(color.substring(1,3),16);
            let G = parseInt(color.substring(3,5),16);
            let B = parseInt(color.substring(5,7),16);

            R = Math.max(0, Math.min(255, parseInt(R * (100 + percent) / 100)));
            G = Math.max(0, Math.min(255, parseInt(G * (100 + percent) / 100)));
            B = Math.max(0, Math.min(255, parseInt(B * (100 + percent) / 100)));

            return `#${R.toString(16).padStart(2, '0')}${G.toString(16).padStart(2, '0')}${B.toString(16).padStart(2, '0')}`;
        }

        function drawParticles() {
            ctx.save();
            particles.forEach(p => {
                ctx.globalAlpha = p.opacity;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.restore();
        }

        function createParticles(x, y, color, count = config.animation.particleCount) {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 8 + 3; // 增加粒子速度
                const size = Math.random() * 3 + 1; // 增加粒子尺寸变化
                particles.push({
                    x: x, y: y, 
                    size: size,
                    color: color,
                    opacity: 1, 
                    vx: Math.cos(angle) * speed, 
                    vy: Math.sin(angle) * speed, 
                    life: 1,
                    gravity: 0.1 + Math.random() * 0.1, // 随机重力
                    friction: 0.98 // 摩擦系数
                });
            }
        }

        function updateParticles() {
            particles = particles.filter(p => {
                // 应用摩擦
                p.vx *= p.friction;
                p.vy *= p.friction;
                
                // 应用重力
                p.vy += p.gravity;
                
                // 更新位置
                p.x += p.vx;
                p.y += p.vy;
                
                // 粒子生命周期
                p.life -= 0.03; // 延长生命周期
                p.opacity = p.life * p.life;
                
                // 粒子大小随生命周期变化
                p.size = p.size * 0.99;
                
                return p.life > 0 && p.size > 0.1;
            });
        }

        function updateScorePopups() {
            scorePopups = scorePopups.filter(popup => {
                popup.y += popup.vy;
                popup.life -= 0.02; // 延长生命周期
                popup.opacity = popup.life;
                // 分数飘字缩放动画
                if (popup.scale < popup.scaleTarget) {
                    popup.scale += 0.05; // 缓慢放大
                    if (popup.scale > popup.scaleTarget) {
                        popup.scale = popup.scaleTarget;
                    }
                }
                return popup.life > 0;
            });
        }

        function updateComboTexts() {
            comboTexts = comboTexts.filter(text => {
                text.life -= 0.02; // 延长生命周期
                text.opacity = text.life;
                // 更自然的缩放动画，先快速放大，然后缓慢缩小
                if (text.scale < text.scaleTarget) {
                    text.scale += text.scaleSpeed;
                    if (text.scale > text.scaleTarget) {
                        text.scale = text.scaleTarget;
                    }
                } else {
                    text.scale -= 0.01; // 缓慢缩小
                }
                return text.life > 0;
            });
        }

        function drawScorePopups() {
            ctx.save();
            scorePopups.forEach(popup => {
                ctx.globalAlpha = popup.opacity;
                ctx.font = `bold ${16 * popup.scale}px Arial`;
                ctx.fillStyle = '#FFD740';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
                ctx.shadowBlur = 3;
                ctx.shadowOffsetX = 1;
                ctx.shadowOffsetY = 1;
                ctx.fillText(`+${popup.score}`, popup.x, popup.y);
            });
            ctx.restore();
        }

        function drawComboTexts() {
            ctx.save();
            comboTexts.forEach(text => {
                ctx.globalAlpha = text.opacity;
                ctx.font = `bold ${24 * text.scale}px Arial`; // 更大的字体
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                // 更明显的阴影效果
                ctx.shadowColor = 'rgba(0, 0, 0, 0.8)';
                ctx.shadowBlur = 6;
                ctx.shadowOffsetX = 2;
                ctx.shadowOffsetY = 2;
                
                // 渐变色效果（通过描边实现）
                ctx.strokeStyle = '#FF3D00';
                ctx.lineWidth = 2;
                ctx.strokeText(`连击 ×${text.combo}`, text.x, text.y);
                
                ctx.fillStyle = '#FF6B6B';
                ctx.fillText(`连击 ×${text.combo}`, text.x, text.y);
            });
            ctx.restore();
        }

        function bindEvents() {
            canvas.addEventListener('click', handleClick);
            canvas.addEventListener('touchstart', function(e) {
                e.preventDefault();
                const touch = e.touches[0];
                const rect = canvas.getBoundingClientRect();
                handleClickAt(touch.clientX - rect.left, touch.clientY - rect.top);
            });
        }

        function handleClick(e) {
            const rect = canvas.getBoundingClientRect();
            handleClickAt(e.clientX - rect.left, e.clientY - rect.top);
        }

        function handleClickAt(x, y) {
            if (isGameOver) return;
            
            const col = Math.floor(x / config.starSize);
            const row = Math.floor(y / config.starSize);
            
            if (row < 0 || row >= config.rows || col < 0 || col >= config.cols || !starGrid[row][col]) return;
            
            const targetStar = starGrid[row][col];
            const matchedStars = findMatchedStars(row, col, targetStar.color);
            
            if (matchedStars.length >= 2) {
                if (popSound) popSound();
                
                // 新的得分规则：(消除星星数量)^2 × 5
                const scoreAdd = Math.pow(matchedStars.length, 2) * 5;
                config.totalScore += Math.floor(scoreAdd);
                
                // 计算消除的中心点，用于显示分数和连击
                let centerX = 0;
                let centerY = 0;
                matchedStars.forEach(({r, c}) => {
                    centerX += c * config.starSize + config.starSize/2;
                    centerY += r * config.starSize + config.starSize/2;
                    if (starGrid[r][c]) {
                        starGrid[r][c].isMatched = true;
                        starGrid[r][c].opacity = 1; // 添加透明度属性
                        createParticles(
                            c * config.starSize + config.starSize/2,
                            r * config.starSize + config.starSize/2,
                            starGrid[r][c].color
                        );
                    }
                });
                centerX /= matchedStars.length;
                centerY /= matchedStars.length;
                
                // 创建分数飘字
                scorePopups.push({
                    x: centerX,
                    y: centerY,
                    score: scoreAdd,
                    opacity: 1,
                    scale: 0.5, // 更小的初始尺寸
                    scaleTarget: 1.2, // 更大的目标尺寸
                    vy: -3, // 更快的上升速度
                    life: 1
                });
                
                // 处理连击
                const currentTime = Date.now();
                if (currentTime - config.combo.lastTime < config.combo.maxTime) {
                    config.combo.counter++;
                } else {
                    config.combo.counter = 1;
                }
                config.combo.lastTime = currentTime;
                
                // 显示连击特效（当连击数≥2时）
                if (config.combo.counter >= 2) {
                    comboTexts.push({
                        x: centerX,
                        y: centerY - 20,
                        combo: config.combo.counter,
                        opacity: 1,
                        scale: 0.2, // 更小的初始尺寸
                        scaleTarget: 1.5, // 更大的目标尺寸
                        scaleSpeed: 0.1, // 更快的缩放速度
                        life: 1
                    });
                }
                
                // 开始消除动画
                let animationStep = 0;
                const maxSteps = 10;
                
                const eliminationAnimation = () => {
                    animationStep++;
                    
                    // 逐渐降低匹配星星的透明度
                    matchedStars.forEach(({r, c}) => {
                        if (starGrid[r][c]) {
                            starGrid[r][c].opacity = 1 - (animationStep / maxSteps);
                        }
                    });
                    
                    drawGame();
                    
                    if (animationStep < maxSteps) {
                        requestAnimationFrame(eliminationAnimation);
                    } else {
                        // 动画完成后移除星星并处理下落
                        removeMatchedStars();
                        animateStarDrop();
                        
                        if (animationFrameId) {
                            cancelAnimationFrame(animationFrameId);
                        }
                        
                        const gameLoop = () => {
                            updateParticles();
                            updateScorePopups();
                            updateComboTexts();
                            updateStarPositions();
                            drawGame();
                            if (particles.length > 0 || checkStarsFalling() || scorePopups.length > 0 || comboTexts.length > 0) {
                                animationFrameId = requestAnimationFrame(gameLoop);
                            } else {
                                drawGame();
                                if (checkAllStarsEliminated()) {
                                    judgeGameResult();
                                }
                            }
                        };
                        gameLoop();
                    }
                };
                
                eliminationAnimation();
                updateUI();
            }
        }

        function animateStarDrop() {
            for (let col = 0; col < config.cols; col++) {
                let emptySpaces = 0;
                for (let row = config.rows - 1; row >= 0; row--) {
                    if (!starGrid[row][col]) {
                        emptySpaces++;
                    } else if (emptySpaces > 0) {
                        starGrid[row][col].isFalling = true;
                        starGrid[row][col].yOffset = emptySpaces * config.starSize;
                    }
                }
            }
        }

        function updateStarPositions() {
            let stillFalling = false;
            for (let row = 0; row < config.rows; row++) {
                for (let col = 0; col < config.cols; col++) {
                    const star = starGrid[row][col];
                    if (star && star.isFalling) {
                        star.yOffset -= (star.yOffset * config.animation.easing) + config.animation.dropSpeed;
                        if (star.yOffset <= 0) {
                            star.yOffset = 0;
                            star.isFalling = false;
                        } else {
                            stillFalling = true;
                        }
                    }
                }
            }
            if (!stillFalling) {
                dropStarsNaturally();
                fillEmptyColumns();
            }
        }

        function checkStarsFalling() {
            for (let row = 0; row < config.rows; row++) {
                for (let col = 0; col < config.cols; col++) {
                    const star = starGrid[row][col];
                    if (star && star.isFalling) {
                        return true;
                    }
                }
            }
            return false;
        }

        function findMatchedStars(startRow, startCol, color) {
            const matched = [];
            const visited = Array(config.rows).fill(null).map(() => Array(config.cols).fill(false));
            
            function dfs(row, col) {
                if (row < 0 || row >= config.rows || col < 0 || col >= config.cols) return;
                if (visited[row][col] || !starGrid[row][col] || starGrid[row][col].color !== color) return;
                
                visited[row][col] = true;
                matched.push({r: row, c: col});
                
                dfs(row - 1, col);
                dfs(row + 1, col);
                dfs(row, col - 1);
                dfs(row, col + 1);
            }
            
            dfs(startRow, startCol);
            return matched;
        }

        function removeMatchedStars() {
            for (let row = 0; row < config.rows; row++) {
                for (let col = 0; col < config.cols; col++) {
                    if (starGrid[row][col] && starGrid[row][col].isMatched) {
                        starGrid[row][col] = null;
                    }
                }
            }
        }

        function dropStarsNaturally() {
            for (let col = 0; col < config.cols; col++) {
                const validStars = [];
                for (let row = config.rows - 1; row >= 0; row--) {
                    if (starGrid[row][col] !== null) {
                        const clonedStar = deepClone(starGrid[row][col]);
                        clonedStar.isMatched = false;
                        clonedStar.yOffset = 0;
                        clonedStar.isFalling = false;
                        validStars.push(clonedStar);
                    }
                }
                
                const newColData = Array(config.rows).fill(null);
                for (let i = 0; i < validStars.length; i++) {
                    newColData[config.rows - 1 - i] = validStars[i];
                }
                
                for (let row = 0; row < config.rows; row++) {
                    starGrid[row][col] = newColData[row];
                }
            }
        }

        function fillEmptyColumns() {
            const validColumns = [];
            for (let col = 0; col < config.cols; col++) {
                let hasStars = false;
                for (let row = 0; row < config.rows; row++) {
                    if (starGrid[row][col] !== null) {
                        hasStars = true;
                        break;
                    }
                }
                if (hasStars) {
                    const clonedCol = [];
                    for (let row = 0; row < config.rows; row++) {
                        clonedCol.push(deepClone(starGrid[row][col]));
                    }
                    validColumns.push(clonedCol);
                }
            }
            
            const newGrid = Array(config.rows).fill(null).map(() => Array(config.cols).fill(null));
            for (let col = 0; col < validColumns.length; col++) {
                for (let row = 0; row < config.rows; row++) {
                    newGrid[row][col] = validColumns[col][row];
                }
            }
            
            starGrid = newGrid;
        }

        function checkAllStarsEliminated() {
            for (let row = 0; row < config.rows; row++) {
                for (let col = 0; col < config.cols; col++) {
                    const star = starGrid[row][col];
                    if (!star) continue;
                    
                    const color = star.color;
                    if (
                        (row > 0 && starGrid[row-1][col] && starGrid[row-1][col].color === color) ||
                        (row < config.rows-1 && starGrid[row+1][col] && starGrid[row+1][col].color === color) ||
                        (col > 0 && starGrid[row][col-1] && starGrid[row][col-1].color === color) ||
                        (col < config.cols-1 && starGrid[row][col+1] && starGrid[row][col+1].color === color)
                    ) {
                        return false;
                    }
                }
            }
            return true;
        }

        function judgeGameResult() {
            isGameOver = true;
            const gameOverTitle = document.getElementById('gameOverTitle');
            const restartBtn = document.getElementById('restartBtn');
            const finalScoreEl = document.getElementById('finalScore');
            const showTargetScoreEl = document.getElementById('showTargetScore');
            
            // 计算剩余星星数量
            let remainingStars = 0;
            for (let row = 0; row < config.rows; row++) {
                for (let col = 0; col < config.cols; col++) {
                    if (starGrid[row][col] !== null) {
                        remainingStars++;
                    }
                }
            }
            
            // 计算终局奖励
            let bonus = 0;
            if (remainingStars <= 10) {
                bonus = 2000 - (remainingStars * 5);
                config.totalScore += bonus;
            }
            
            finalScoreEl.textContent = config.totalScore;
            showTargetScoreEl.textContent = config.targetScore;
            
            if (config.totalScore >= config.targetScore) {
                gameOverTitle.textContent = '🎉 恭喜通关！';
                restartBtn.textContent = '下一关';
            } else {
                gameOverTitle.textContent = '💔 挑战失败';
                restartBtn.textContent = '重新开始';
            }
            
            document.getElementById('gameOver').style.display = 'flex';
        }

        function updateUI() {
            document.getElementById('score').textContent = config.totalScore;
            document.getElementById('level').textContent = config.level;
            document.getElementById('targetScore').textContent = config.targetScore;
        }

        function calculateTargetScore(level) {
            if (level === 1) return 1000;
            if (level === 2) return 1500;
            if (level === 3) return 2000;
            if (level === 4) return 2000;
            if (level >= 5 && level <= 10) return 2500;
            if (level >= 11 && level <= 20) return 3000;
            if (level >= 21 && level <= 30) return 4000;
            if (level >= 31 && level <= 50) return 4000 + Math.floor((level - 30) * 2500);
            return 4000 + (50 - 30) * 2500 + (level - 50) * 2000;
        }

        function handleRestart() {
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
            }
            particles = [];
            scorePopups = [];
            comboTexts = [];
            config.combo.counter = 0;
            config.combo.lastTime = 0;
            
            const restartBtn = document.getElementById('restartBtn');
            if (restartBtn.textContent === '下一关') {
                config.level++;
                config.targetScore = calculateTargetScore(config.level);
            } else {
                config.level = 1;
                config.totalScore = 0;
                config.targetScore = calculateTargetScore(config.level);
            }
            initGame();
        }

        window.addEventListener('beforeunload', () => {
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
            }
        });

        window.addEventListener('load', initGame);
        
        document.addEventListener('click', function() {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (AudioContext && !popSound) {
                initSound();
            }
        }, { once: true });
    </script>
</body>
